<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 3</title>
    <link rel="styleheet" href='../normalize.css'>
    <style rel="styleheet">
        *,*:before, *:after{
         -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
                box-sizing: border-box;    
        }

        .menu-select{
            float: 18px/1.4 arial,sans-serif;
            color: #333;
            background: #ccc;
        }
        #tudo{
            width: 100%;
            max-width: 1200px;
            min-width: 860px;
            margin: 0 auto;
            background: #fff;
        }
        
        .clear{ clear: both;}

        body {
            font: 18px/1.4 arial,sans-serif;
            color: #333;
            background: #ccc;
        }

        h1, h2, h3, h4, h5, h6{
            color: #036;
        }

        main h1{
            margin-top: -25px;}
            .topo_header{
                background: #036;
                padding: 5px 20px;
            }

        .topo_header h1{
            font-size: 36px;
            margin: 4px 0 2px 0;
        }

        .topo_header a{
            color: #fff;
            text-decoration: none;
           
        }

        .topo_header h2{
            font-size: 20px;
            margin: 2px 0 4px 0;
            color: #fff;
        }
        
        .principal{
            width: 100%;
            padding: 20px 15px;
        }
        
        .rodape{
            background: #036;
            color: #fff;
            padding: 5px 0;
            text-align: center;
        }

        pre{font-size: 14px;}

        @media(max-width:1040px){
            pre{font-size: 12px;}
        }

        /* campos de formularios*/

        button, select, .bck{
            display: block;
            margin-bottom: 25px;
        }

        label[for="msg"]{
            display: block;
        
        }
    </style>    
</head>
<body>
    
</body>
</html>
